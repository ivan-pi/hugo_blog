baseURL = "https://ivan-pi.github.io/"
title = "Ivan Pribec"
theme = "hugo-simple"
defaultContentLanguage = "en"
languageCode = "en-us"
copyright = "© 2025 — Ivan Pribec — All rights reserved."
timeZone = "Local"

# Safety net: never publish stray scratch files accidentally left inside
# content/. Real posts are Markdown; loose code/notes/data belong OUTSIDE
# content/ (see instructions_for_myself.md). These patterns keep source-code
# and notes dumps from being copied verbatim onto the live site.
# NOTE: this also excludes such files from page bundles — if you ever need to
# publish e.g. a .py alongside a post, remove the matching pattern or rename.
# (.pdf, .odt, images, etc. are intentionally NOT ignored — the CV and figures
# rely on them.)
ignoreFiles = [
  '\.py$',
  '\.txt$',
  '\.c$',
  '\.h$',
  '\.cpp$',
  '\.f$',
  '\.f90$',
  '\.dat$',
  '\.csv$',
  '\.log$',
]

# Pagination
[pagination]
  pagerSize = 10
  path = "page"

[markup]
defaultMarkdownHandler = "goldmark"
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
lineNos = false
lineNumbersInTable = false
noClasses = true
style = "catppuccin-latte"


disableKinds = ["taxonomy"]

# Taxonomies
[taxonomies]
  tag = "tags"
  category = "categories"

# Menu
[menu]
[[menu.main]]
name = "home"
pageRef = "/"
weight=1

  # Header
  [[menu.main]]
    url = "/posts/"
    name = "blog"
    weight = 10
  [[menu.main]]
    url = "/code/"
    name = "code"
    weight = 40
  [[menu.main]]
    url = "/diary/"
    name = "diary"
    weight = 40
  [[menu.main]]
    url = "/now/"
    name = "now"
    weight = 50

  # Footer
  [[menu.footer]]
    url = "https://github.com/ivan-pi"
    name = "GitHub"
    weight = 1
  [[menu.footer]]
    url = "/posts/index.xml"
    name = "RSS"
    weight = 2


# Links format
[permalinks]
  posts = "/posts/:year/:month/:title/"

[params]
# Date format (default: Jan 2, 2006)
# datefmt  = "Jan 2, 2006"
# enable_katex = true
katex = true
custom_css = ["css/address.css"]
title = "Ivan Pribec"
description = "Ivan's personal website"
dateFormat = "2006-01-02"
hideMadeWithLine = true
hideRSSLink = true
[params.author]
name = "Ivan Pribec"