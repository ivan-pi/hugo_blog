baseURL = "https://ivan-pi.github.io/"
title = "Ivan Pribec"
theme = "hugo-simple"
defaultContentLanguage = "en"
languageCode = "en-us"
copyright = "© 2025 — Ivan Pribec — All rights reserved."
timeZone = "Local"

# Pagination
[pagination]
  pagerSize = 10
  path = "page"

[markup]
defaultMarkdownHandler = "goldmark"
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
lineNos = false
lineNumbersInTable = false
noClasses = true
style = "catppuccin-latte"


disableKinds = ["taxonomy"]

# Taxonomies
[taxonomies]
  tag = "tags"
  category = "categories"

# Menu
[menu]
[[menu.main]]
name = "home"
pageRef = "/"
weight=1

  # Header
  [[menu.main]]
    url = "/posts/"
    name = "blog"
    weight = 10
  [[menu.main]]
    url = "/code/"
    name = "code"
    weight = 40
  [[menu.main]]
    url = "/diary/"
    name = "diary"
    weight = 40
  [[menu.main]]
    url = "/now/"
    name = "now"
    weight = 50


# Links format
[permalinks]
  posts = "/posts/:year/:month/:title/"

[params]
# Date format (default: Jan 2, 2006)
# datefmt  = "Jan 2, 2006"
# enable_katex = true
katex = true
custom_css = ["css/address.css"]
title = "Ivan Pribec"
description = "Ivan's personal website"
dateFormat = "2006-01-02"
hideMadeWithLine = true
hideRSSLink = true
[params.author]
name = "Ivan Pribec"